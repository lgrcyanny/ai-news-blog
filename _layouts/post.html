<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a24;
            --text-primary: #e8e8ed;
            --text-secondary: #8888a0;
            --accent: #00d4aa;
            --accent-dim: #00a88a;
            --border: #2a2a3a;
            --gradient: linear-gradient(135deg, #00d4aa 0%, #0088ff 100%);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.7;
            padding: 40px 20px;
        }
        
        .container { max-width: 800px; margin: 0 auto; }
        
        header {
            text-align: center;
            margin-bottom: 60px;
            padding-bottom: 40px;
            border-bottom: 1px solid var(--border);
        }
        
        h1 {
            font-size: 2rem;
            font-weight: 700;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 12px;
        }
        
        .meta {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 12px;
        }
        
        .content {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
        }
        
        .content h2 {
            font-size: 1.5rem;
            margin: 40px 0 20px;
            color: var(--text-primary);
        }
        
        .content h3 {
            font-size: 1.2rem;
            margin: 30px 0 15px;
            color: var(--text-primary);
        }
        
        .content p { margin-bottom: 16px; color: var(--text-secondary); }
        
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .content th, .content td {
            border: 1px solid var(--border);
            padding: 12px;
            text-align: left;
        }
        
        .content th {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        
        .content a {
            color: var(--accent);
            text-decoration: none;
        }
        
        .content a:hover {
            text-decoration: underline;
        }
        
        .content code {
            background: var(--bg-secondary);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 0.9em;
        }
        
        .content pre {
            background: var(--bg-secondary);
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 20px 0;
        }
        
        .content pre code {
            background: none;
            padding: 0;
        }
        
        .content blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 20px;
            margin: 20px 0;
            color: var(--text-secondary);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 40px;
            color: var(--accent);
            text-decoration: none;
        }
        
        .back-link:hover { text-decoration: underline; }
        
        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📝 大模型专栏</h1>
            <p class="meta">{{ page.date | date: "%Y年%m月%d日" }} · {{ page.author }}</p>
        </header>
        
        <article class="content">
            {{ content }}
        </article>
        
        <a href="/" class="back-link">← 返回首页</a>
        
        <footer>
            <p>AI 每日资讯 · Powered by GitHub Pages</p>
        </footer>
    </div>
</body>
</html>
