title: AI 每日资讯
description: AI 行业资讯与深度解析
theme: jekyll-theme-minimal
show_downloads: false
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap
relative_links:
  enabled: true
  collections: true
include:
  - _posts
  - _pages
exclude:
  - vendor
  - node_modules
  - "*.md"
keep_files:
  - _posts
  - README.md
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: post
      permalink: /blog/:title/
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page