name: Update AI News

on:
  schedule:
    # 每天早上 9 点自动运行（北京时间）
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run AI News Aggregator
        run: python3 aggregator.py

      - name: Update index.html with latest news
        run: |
          python3 << 'EOF'
          import json
          from datetime import datetime

          # Load news data
          with open("news.json", "r", encoding="utf-8") as f:
              news_data = json.load(f)

          items = news_data.get("items", [])
          
          # Generate HTML news items
          news_html = ""
          for item in items[:15]:
              title = item.get("title", "Untitled")
              link = item.get("link", "#")
              source = item.get("source", "Unknown")
              pub_date = item.get("pubDate", "")[:10]
              desc = item.get("description", "")[:100]
              
              news_html += f'''
              <article class="news-item">
                  <h3 class="news-title">
                      <a href="{link}" target="_blank" rel="noopener">{title}</a>
                  </h3>
                  <div class="news-meta">
                      <span class="news-source">{source}</span>
                      <span>·</span>
                      <span>{pub_date}</span>
                  </div>
                  <p class="news-description">{desc}</p>
              </article>'''

          # Read template
          with open("index.html", "r", encoding="utf-8") as f:
              html = f.read()

          # Update date and news
          date_str = datetime.now().strftime("%Y年%m月%d日 %A")
          html = html.replace('id="current-date"', f'id="current-date">{date_str}')
          html = html.replace('<!-- News will be populated here -->', news_html)

          # Save updated HTML
          with open("index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print(f"Updated HTML with {len(items)} items")
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          git diff --staged --quiet || git commit -m "Update news $(date '+%Y-%m-%d %H:%M')"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4